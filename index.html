<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Flowtech – Reporte de Análisis</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="alternate icon" href="mono.png"/>
<link rel="apple-touch-icon" href="mono.png"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="upload-screen">
  <div class="upload-card">
    <div id="upload-form">
      <div style="min-height:52px;display:flex;align-items:center;justify-content:center;margin-bottom:8px">
        <img src="logo.png" alt="Flowtech" style="height:52px;background:#0A1726;border-radius:6px;padding:8px 16px"/>
      </div>
      <p>Sube el PDF del laboratorio Bureau Veritas / LOAMS para generar un reporte con la marca Flowtech.</p>

      <div class="field-block">
        <div class="label-row">
          <label class="field-label" for="client-select">Cliente</label>
          <button class="link-btn" id="manage-clients-btn" type="button">⚙ Gestionar clientes</button>
        </div>
        <select id="client-select" class="text-input"></select>
      </div>

      <div class="field-block">
        <label class="field-label" for="empresa-input">Empresa</label>
        <input id="empresa-input" class="text-input" type="text" placeholder="Ej. Aceros del Norte"/>
      </div>
      <div class="field-block">
        <label class="field-label" for="generado-input">Generado por</label>
        <input id="generado-input" class="text-input" type="text" placeholder="Ej. Ramiro Oropeza"/>
      </div>

      <div class="drop-zone" id="drop-zone">
        <svg width="38" height="38" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 8l-4-4-4 4M12 4v12"/></svg>
        <span>Arrastra el PDF aquí o haz clic para buscar</span>
        <span style="font-size:.76rem;margin-top:4px;color:#bbb">Formato Bureau Veritas / LOAMS</span>
        <input type="file" accept=".pdf,application/pdf" id="file-input"/>
      </div>

      <button class="link-btn" id="history-btn" type="button" style="display:block;margin:18px auto 0;font-size:.86rem">📋 Ver historial de reportes</button>
    </div>

    <div id="processing">
      <div class="brand-loader">
        <img src="loader/p1.png" alt="" style="--ox:60px;--oy:-60px;--orot:8deg"/>
        <img src="loader/p2.png" alt="" style="--ox:-60px;--oy:60px;--orot:-8deg"/>
        <img src="loader/p3.png" alt="" style="--ox:-80px;--oy:-20px;--orot:8deg"/>
        <img src="loader/p4.png" alt="" style="--ox:80px;--oy:20px;--orot:-8deg"/>
        <img src="loader/p5.png" alt="" style="--ox:-60px;--oy:-60px;--orot:8deg"/>
        <img src="loader/p6.png" alt="" style="--ox:60px;--oy:60px;--orot:-8deg"/>
        <img src="loader/p7.png" alt="" style="--ox:60px;--oy:-60px;--orot:8deg"/>
        <img src="loader/p8.png" alt="" style="--ox:-60px;--oy:60px;--orot:-8deg"/>
      </div>
      <span id="processing-label">Extrayendo datos con IA…</span>
    </div>
    <div id="progress-bar-wrap">
      <div style="background:#eee;border-radius:4px;height:6px;overflow:hidden">
        <div id="progress-bar" style="height:100%;background:var(--orange);width:0%;transition:width .4s ease;border-radius:4px"></div>
      </div>
      <div id="progress-text" style="font-size:.75rem;color:#888;margin-top:6px;text-align:center"></div>
    </div>
    <div id="upload-error"></div>
  </div>
</div>

<div id="report-screen">
  <div class="report-wrap">
    <div class="toolbar">
      <span class="toolbar-note" id="edit-hint">💡 Activa "Editar" para corregir datos antes de guardar.</span>
      <label style="font-size:.78rem;color:#555;display:flex;align-items:center;gap:6px;margin-right:8px">Límites:
        <select id="limits-override" class="text-input" style="width:auto;min-width:120px;padding:6px 28px 6px 10px;font-size:.82rem"></select>
      </label>
      <span id="save-status" style="font-size:.76rem;color:#1db954;margin-right:8px;font-weight:600"></span>
      <button class="edit-toggle" id="edit-btn" type="button">✏️ Editar campos</button>
      <button class="btn" id="csv-btn" type="button">⬇ CSV</button>
      <button class="btn" id="hydac-btn" type="button">⬇ HYDAC</button>
      <button class="btn" id="print-btn" type="button">🖨 Imprimir</button>
      <button class="btn" id="new-report-btn" type="button">← Nuevo reporte</button>
      <button class="btn btn-orange" id="pdf-btn" type="button">⬇ Descargar PDF</button>
    </div>
    <div id="reports-container"></div>
  </div>
</div>

<div id="history-screen">
  <div class="report-wrap">
    <div class="toolbar">
      <span class="toolbar-note">📋 Historial de reportes guardados</span>
      <button class="btn" id="history-back-btn" type="button">← Volver</button>
    </div>
    <div class="report-paper" style="padding:6px 4px"><div id="history-list"></div></div>
  </div>
</div>

<!-- Client manager modal (filled in by clientEditor.js) -->
<div class="modal-overlay" id="client-modal"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
