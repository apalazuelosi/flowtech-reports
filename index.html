<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Flowtech – Reporte de Análisis</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
:root{--navy:#0A1726;--offwhite:#F2F0ED;--orange:#F04600;--gray:#B5B8BD;--yellow:#F9F969}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter Tight',sans-serif;background:#e8e6e3;min-height:100vh;padding:24px}
#upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh}
.upload-card{background:white;border-radius:16px;padding:40px 48px;text-align:center;max-width:520px;width:100%;box-shadow:0 4px 24px rgba(10,23,38,.12)}
.upload-card>p{color:#666;font-size:.88rem;margin:10px 0 22px}
.drop-zone{border:2px dashed var(--gray);border-radius:12px;padding:36px;cursor:pointer;transition:.2s;position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:var(--orange);background:#fff5f2}
.drop-zone svg{margin-bottom:10px;opacity:.4}
.drop-zone span{display:block;color:#888;font-size:.88rem}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
#processing{display:none;justify-content:center;margin-top:20px;gap:12px;color:var(--navy);font-weight:500;align-items:center}
.spinner{width:22px;height:22px;border:3px solid var(--gray);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#upload-error{display:none;margin-top:14px;color:var(--orange);font-size:.83rem}
#report-screen{display:none}
.report-wrap{max-width:860px;margin:0 auto}
.toolbar{display:flex;gap:10px;justify-content:flex-end;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.toolbar-note{font-size:.76rem;color:#777;margin-right:auto}
.btn{background:var(--navy);color:white;border:none;border-radius:8px;padding:10px 20px;font-family:'Inter Tight',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:.2s}
.btn:hover{background:#1a3050}
.btn-orange{background:var(--orange)}.btn-orange:hover{background:#d03e00}
.edit-toggle{background:white;color:var(--navy);border:2px solid var(--navy);border-radius:8px;padding:9px 18px;font-family:'Inter Tight',sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;transition:.2s}
.edit-toggle:hover,.edit-toggle.active{background:var(--navy);color:white}
.report-paper{background:white;border-radius:4px;box-shadow:0 2px 20px rgba(10,23,38,.15);overflow:hidden}
.report-header{background:var(--navy);padding:22px 36px;display:flex;justify-content:space-between;align-items:center}
.header-right{text-align:right}
.report-title{font-family:'Orbitron',sans-serif;color:var(--offwhite);font-size:.9rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.report-subtitle{color:var(--gray);font-size:.7rem;margin-top:4px;letter-spacing:.06em}
.status-bar{padding:13px 36px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee}
.slabel{font-size:.7rem;color:#999;text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.status-badge{font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;padding:5px 16px;border-radius:4px;letter-spacing:.06em;display:inline-block}
.status-badge.critical{background:var(--orange);color:white}
.status-badge.warning{background:var(--yellow);color:var(--navy)}
.status-badge.normal{background:#1db954;color:white}

/* Status dropdown – hidden by default, shown in edit mode */
.status-select{
  display:none;
  font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;
  padding:5px 12px;border-radius:4px;letter-spacing:.06em;
  border:2px dashed var(--orange);background:#fffbe6;color:var(--navy);
  cursor:pointer;outline:none;
}
.edit-mode .status-badge{display:none}
.edit-mode .status-select{display:inline-block}

@media print{
  .status-select{display:none!important}
  .status-badge{display:inline-block!important}
}

.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #eee}
.info-cell{padding:16px 22px;border-right:1px solid #eee}
.info-cell:last-child{border-right:none}
.info-cell h4{font-family:'Orbitron',sans-serif;font-size:.56rem;color:var(--orange);text-transform:uppercase;letter-spacing:.15em;margin-bottom:9px;font-weight:600}
.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid #f4f4f4}
.info-row:last-child{border-bottom:none}
.info-key{font-size:.71rem;color:#888;flex-shrink:0;padding-right:8px}
.editable-field{background:transparent;border:none;outline:none;font-family:'Inter Tight',sans-serif;font-size:.76rem;color:var(--navy);font-weight:600;text-align:right;width:100%;cursor:default;padding:0;pointer-events:none}
.edit-mode .editable-field{background:#fffbe6;border-bottom:1.5px dashed var(--orange);cursor:text;border-radius:2px;padding:1px 4px;pointer-events:auto}
.editable-rec{background:transparent;border:none;outline:none;font-family:'Inter Tight',sans-serif;font-size:.82rem;color:#444;line-height:1.65;width:100%;resize:none;cursor:default;overflow:hidden;display:block;pointer-events:none}
.edit-mode .editable-rec{background:#fffbe6;border:1.5px dashed var(--orange);cursor:text;border-radius:4px;padding:6px;pointer-events:auto}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#eee;margin:20px 0 4px}
.kpi-card{background:white;padding:18px 24px;text-align:center}
.kpi-label{font-size:.68rem;color:#999;text-transform:uppercase;letter-spacing:.12em;font-weight:500;margin-bottom:8px}
.kpi-value{font-size:2rem;font-family:'Orbitron',sans-serif;font-weight:700;color:var(--navy)}
.kpi-value.critical{color:var(--orange)}
.kpi-value.warning{color:#b8a000}.kpi-unit{font-size:.7rem;color:#aaa;margin-top:4px}
.section-header{background:var(--navy);padding:9px 36px;display:flex;align-items:center;gap:10px}
.section-header h2{font-family:'Orbitron',sans-serif;color:var(--offwhite);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600}
.section-dot{width:6px;height:6px;background:var(--orange);border-radius:50%;flex-shrink:0}
.results-section{padding:14px 36px 20px}
.particle-bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f4f4f4}
.particle-bar-row:last-child{border-bottom:none}
.pb-label{font-size:.76rem;color:#555;width:130px;flex-shrink:0}
.pb-track{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.pb-fill{height:100%;border-radius:4px;background:var(--navy)}
.pb-val{font-size:.76rem;font-weight:600;color:var(--navy);width:80px;text-align:right;flex-shrink:0}
.rec-section{margin:0 36px 24px;background:#fff8f5;border-left:4px solid var(--orange);border-radius:0 8px 8px 0;padding:14px 18px}
.rec-label{font-family:'Orbitron',sans-serif;font-size:.56rem;color:var(--orange);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.report-footer{background:#f7f5f2;border-top:1px solid #e8e6e3;padding:12px 36px;display:flex;justify-content:space-between;align-items:center}
.footer-pg{font-size:.7rem;color:#999;font-weight:500}
@media print{
  html,body{height:100%;margin:0;padding:0;background:white}
  .toolbar{display:none}
  #report-screen{display:block!important}
  .report-wrap{max-width:100%;margin:0;height:100%}
  .report-paper{box-shadow:none;border:none;min-height:100vh;display:flex;flex-direction:column}
  .editable-field,.editable-rec{background:transparent!important;border:none!important}
  .results-section{flex:1}
  @page{size:letter;margin:8mm}
}
</style>
</head>
<body>

<div id="upload-screen">
  <div class="upload-card">
    <div style="min-height:52px;display:flex;align-items:center;justify-content:center;margin-bottom:8px">
      <img src="logo.png" alt="Flowtech" style="height:52px;background:#0A1726;border-radius:6px;padding:8px 16px"/>
    </div>
    <p>Sube el PDF del laboratorio Bureau Veritas / LOAMS para generar un reporte con la marca Flowtech.</p>
    <div style="margin-bottom:16px;text-align:left">
      <label style="font-size:.76rem;color:#888;font-weight:500;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Empresa / Cliente</label>
      <input id="empresa-input" type="text" placeholder="Ej. Aceros del Norte" style="width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-family:'Inter Tight',sans-serif;font-size:.88rem;color:#333;outline:none;transition:.2s" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='#ddd'"/>
    </div>
    <div style="margin-bottom:16px;text-align:left">
      <label style="font-size:.76rem;color:#888;font-weight:500;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Generado por</label>
      <input id="generado-input" type="text" placeholder="Ej. Ramiro Oropeza" style="width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-family:'Inter Tight',sans-serif;font-size:.88rem;color:#333;outline:none;transition:.2s" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='#ddd'"/>
    </div>
    <div class="drop-zone" id="drop-zone">
      <svg width="38" height="38" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 8l-4-4-4 4M12 4v12"/></svg>
      <span>Arrastra el PDF aquí o haz clic para buscar</span>
      <span style="font-size:.76rem;margin-top:4px;color:#bbb">Formato Bureau Veritas / LOAMS</span>
      <input type="file" accept=".pdf,application/pdf" id="file-input"/>
    </div>
    <div id="processing">
  <div class="spinner"></div>
  <span id="processing-label">Extrayendo datos con IA…</span>
</div>
<div id="progress-bar-wrap" style="display:none;margin-top:12px;width:100%">
  <div style="background:#eee;border-radius:4px;height:6px;overflow:hidden">
    <div id="progress-bar" style="height:100%;background:var(--orange);width:0%;transition:width .4s ease;border-radius:4px"></div>
  </div>
  <div id="progress-text" style="font-size:.75rem;color:#888;margin-top:6px;text-align:center"></div>
</div>
    <div id="upload-error"></div>
  </div>
</div>

<div id="report-screen">
  <div class="report-wrap">
    <div class="toolbar">
      <span class="toolbar-note" id="edit-hint">💡 Activa "Editar" para corregir datos antes de guardar.</span>
      <button class="edit-toggle" id="edit-btn" onclick="toggleEdit()">✏️ Editar campos</button>
      <button class="btn" onclick="resetApp()">← Nuevo reporte</button>
      <button class="btn btn-orange" onclick="window.print()">🖨 Imprimir / Guardar PDF</button>
    </div>
    <div id="reports-container"></div>
  </div>
</div>

<script>
const NETLIFY_FN = '/.netlify/functions/analyze';
const BATCH_SIZE = 4;
let editMode = false;

// Status config: value → { label, cssClass }
const STATUS_OPTIONS = [
  { value: 'CRITICAL', label: 'CRÍTICO',    cssClass: 'critical' },
  { value: 'WARNING',  label: 'PRECAUCIÓN', cssClass: 'warning'  },
  { value: 'NORMAL',   label: 'ACEPTABLE',  cssClass: 'normal'   },
];

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('drag')});
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e=>{e.preventDefault();dropZone.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processFile(f)});
fileInput.addEventListener('change', e=>{if(e.target.files[0])processFile(e.target.files[0])});

async function processFile(file){
  if(!file.name.endsWith('.pdf')&&!file.type.includes('pdf')){showError('Por favor sube un archivo PDF.');return}
  showProcessing(true);
  try{
    // Read raw bytes for pdf-lib
    const arrayBuffer = await file.arrayBuffer();
    const srcPdf = await PDFLib.PDFDocument.load(arrayBuffer);
    const totalPages = srcPdf.getPageCount();
    const totalBatches = Math.ceil(totalPages / BATCH_SIZE);

    setProgress(0, totalBatches);
    const allSamples = [];

    for(let b = 0; b < totalBatches; b++){
      const start = b * BATCH_SIZE;
      const end   = Math.min(start + BATCH_SIZE, totalPages);

      // Build a sub-PDF with just these pages
      const subPdf  = await PDFLib.PDFDocument.create();
      const indices = [];
      for(let i = start; i < end; i++) indices.push(i);
      const copied = await subPdf.copyPages(srcPdf, indices);
      copied.forEach(p => subPdf.addPage(p));
      const subBytes = await subPdf.save();

      // Convert to base64
      // Safe base64 encoding that won't blow the call stack on large files
      const bytes = new Uint8Array(subBytes);
      let binary = '';
      for(let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
      const b64 = btoa(binary);

      setProgress(b, totalBatches, start+1, end, totalPages);
      const samples = await extractLabData(b64);
      allSamples.push(...(Array.isArray(samples) ? samples : [samples]));
      setProgress(b+1, totalBatches, start+1, end, totalPages);
    }

    renderReport(allSamples);
  } catch(err){
    console.error('ERROR:', err.message, err.stack);
    showError('Error al extraer datos: '+err.message);
  } finally{
    showProcessing(false);
  }
}

function setProgress(doneBatches, totalBatches, pageStart, pageEnd, totalPages){
  const pct = Math.round((doneBatches / totalBatches) * 100);
  document.getElementById('progress-bar').style.width = pct+'%';
  if(pageStart != null){
    const batchLabel = totalPages > BATCH_SIZE
      ? ` (páginas ${pageStart}–${pageEnd} de ${totalPages})`
      : '';
    document.getElementById('progress-text').textContent =
      doneBatches < totalBatches
        ? `Analizando lote ${doneBatches+1} de ${totalBatches}${batchLabel}…`
        : `✓ Análisis completo`;
  }
  document.getElementById('progress-bar-wrap').style.display = totalBatches > 1 ? 'block' : 'none';
}

async function extractLabData(b64){
  const prompt=`Eres un extractor de datos de reportes de análisis de aceite de Bureau Veritas / LOAMS.
El PDF puede contener UNA o MÚLTIPLES muestras (una por página).
Extrae TODAS las muestras que encuentres.
Responde ÚNICAMENTE con un array JSON válido, sin markdown ni explicación.
Cada elemento del array debe tener estos campos (usa null si no se encuentra):

[{
  "status": "CRITICAL" o "WARNING" o "NORMAL" o "CAUTION",
  "labNo": "string",
  "sampledDate": "string",
  "receivedDate": "string",
  "completedDate": "string",
  "unitId": "string",
  "componentDescription": "string",
  "worksite": "string",
  "referenceNo": "string",
  "fluidManufacturer": "string",
  "fluidProduct": "string",
  "fluidGrade": "string",
  "evaluatedBy": "string",
  "isoCode": "string",
  "waterKFppm": number o null,
  "waterCritical": true o false,
  "particles4um": number o null,
  "particles6um": number o null,
  "particles14um": number o null,
  "particles21um": number o null,
  "particles38um": number o null,
  "particles70um": number o null,
  "recommendation": "string" o null
}]
waterCritical = true si el valor de agua está marcado con * o resaltado como crítico.`;

  const resp = await fetch(NETLIFY_FN, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({pdfBase64: b64})
  });
  if(!resp.ok){const t=await resp.text();throw new Error(`API ${resp.status}: ${t}`);}
  const text = await resp.text();
  return JSON.parse(text);
}

// Resolve incoming status (handles CAUTION → WARNING bucket)
function resolveStatus(raw){
  const s=(raw||'').toUpperCase();
  if(s==='CRITICAL') return 'CRITICAL';
  if(s==='WARNING'||s==='CAUTION') return 'WARNING';
  return 'NORMAL';
}

function statusInfo(value){
  return STATUS_OPTIONS.find(o=>o.value===value) || STATUS_OPTIONS[2];
}

function renderReport(data){
  const samples = Array.isArray(data) ? data : [data];
  const empresa = document.getElementById('empresa-input').value.trim() || null;
  const generadoPor = document.getElementById('generado-input').value.trim() || null;
  const container = document.getElementById('reports-container');
  container.innerHTML = '';
  const genDate = new Date().toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'});

  samples.forEach((d, idx) => {
    const currentStatus = resolveStatus(d.status);
    const si = statusInfo(currentStatus);

    // Build status options HTML
    const optionsHTML = STATUS_OPTIONS.map(o=>
      `<option value="${o.value}"${o.value===currentStatus?' selected':''}>${o.label}</option>`
    ).join('');

    const particles=[
      {label:'>4 µm  (p/ml)',val:d.particles4um},{label:'>6 µm  (p/ml)',val:d.particles6um},
      {label:'>14 µm (p/ml)',val:d.particles14um},{label:'>21 µm (p/ml)',val:d.particles21um},
      {label:'>38 µm (p/ml)',val:d.particles38um},{label:'>70 µm (p/ml)',val:d.particles70um},
    ];
    const maxVal=Math.max(...particles.map(p=>p.val||0))||1;
    const barsHTML=particles.map(p=>{
      const pct=p.val!=null?Math.max(3,(p.val/maxVal)*100):0;
      return`<div class="particle-bar-row">
        <span class="pb-label">${p.label}</span>
        <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
        <span class="pb-val">${p.val!=null?p.val.toLocaleString('es-MX'):'N/R'}</span>
      </div>`;
    }).join('');

    const recHTML = d.recommendation ? `
      <div class="rec-section">
        <div class="rec-label">⚠ Nota del Analista</div>
        <textarea class="editable-rec" rows="1">${d.recommendation}</textarea>
      </div>` : '';

    const paper = document.createElement('div');
    paper.className='report-paper';
    paper.style.cssText='margin-bottom:32px';
    paper.innerHTML=`
      <div class="report-header">
        <img src="logo.png" alt="Flowtech" style="height:46px;display:block;"/>
        <div class="header-right">
          <div class="report-title">Reporte de Análisis de Fluidos</div>
          <div class="report-subtitle">ISO · Contaminación por Partículas · Agua</div>
        </div>
      </div>
      <div class="status-bar">
        <div>
          <div class="slabel">Estado del Análisis</div>
          <div style="margin-top:6px">
            <span class="status-badge ${si.cssClass}">${si.label}</span>
            <select class="status-select">
              ${optionsHTML}
            </select>
          </div>
        </div>
        <div style="text-align:right">
          <div class="slabel">Reporte generado</div>
          <div style="font-size:.8rem;color:#555;font-weight:500;margin-top:4px">${genDate}</div>
        </div>
      </div>
      <div class="info-grid">
        <div class="info-cell">
          <h4>Información de Muestra</h4>
          <div class="info-row"><span class="info-key">No. Lab</span><input class="editable-field" value="${d.labNo||'—'}"/></div>
          <div class="info-row"><span class="info-key">Fecha de muestra</span><input class="editable-field" value="${d.sampledDate||'—'}"/></div>
          <div class="info-row"><span class="info-key">Recibida</span><input class="editable-field" value="${d.receivedDate||'—'}"/></div>
          <div class="info-row"><span class="info-key">Completada</span><input class="editable-field" value="${d.completedDate||'—'}"/></div>
        </div>
        <div class="info-cell">
          <h4>Unidad / Componente</h4>
          <div class="info-row"><span class="info-key">ID Unidad</span><input class="editable-field" value="${d.unitId||'—'}"/></div>
          <div class="info-row"><span class="info-key">Componente</span><input class="editable-field" value="${d.componentDescription||'—'}"/></div>
          <div class="info-row"><span class="info-key">Empresa</span><input class="editable-field" value="${safeVal(empresa || d.worksite)}"/></div>
          <div class="info-row"><span class="info-key">No. Referencia</span><input class="editable-field" value="${d.referenceNo||'—'}"/></div>
        </div>
        <div class="info-cell">
          <h4>Fluido</h4>
          <div class="info-row"><span class="info-key">Fabricante</span><input class="editable-field" value="${d.fluidManufacturer||'—'}"/></div>
          <div class="info-row"><span class="info-key">Producto</span><input class="editable-field" value="${d.fluidProduct||'—'}"/></div>
          <div class="info-row"><span class="info-key">Grado</span><input class="editable-field" value="${d.fluidGrade?'ISO '+d.fluidGrade.replace(/iso\s*/i,''):'—'}"/></div>
          <div class="info-row"><span class="info-key">Generado por</span><input class="editable-field" value="${safeVal(generadoPor || d.evaluatedBy)}"/></div>
        </div>
      </div>
      <div style="padding:0 36px">
        <div class="kpi-row">
          <div class="kpi-card">
            <div class="kpi-label">Código de Limpieza ISO</div>
            <div class="kpi-value${currentStatus==='CRITICAL'?' critical':''}">${d.isoCode||'—'}</div>
            <div class="kpi-unit">ISO 4406:1999</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Contenido de Agua (KF)</div>
            <div class="kpi-value${d.waterKFppm!=null&&d.waterKFppm>=500?' critical':d.waterKFppm!=null&&d.waterKFppm>=250?' warning':''}">${d.waterKFppm!=null?d.waterKFppm.toLocaleString('es-MX'):'N/R'}</div>
            <div class="kpi-unit">PPM${d.waterKFppm!=null&&d.waterKFppm>=500?' · ⚠ CRÍTICO':d.waterKFppm!=null&&d.waterKFppm>=250?' · PRECAUCIÓN':''}</div>
          </div>
        </div>
      </div>
      <div class="section-header" style="margin-top:20px">
        <div class="section-dot"></div><h2>Conteo de Partículas</h2>
      </div>
      <div class="results-section">${barsHTML}</div>
      <div class="section-header">
        <div class="section-dot"></div><h2>Recomendación de Mantenimiento</h2>
      </div>
      <div style="height:10px"></div>
      ${recHTML}
      <div style="height:16px"></div>
      <div class="report-footer">
        <img src="mono.png" alt="Flowtech" style="height:30px;display:block;opacity:.45"/>
        <div class="footer-pg">Página ${idx+1} de ${samples.length}</div>
      </div>`;

    container.appendChild(paper);

    // Wire up the status dropdown
    const select = paper.querySelector('.status-select');
    const badge  = paper.querySelector('.status-badge');
    const isoValue   = paper.querySelector('.kpi-value');
    const dots       = paper.querySelectorAll('.section-dot');
    const recSection = paper.querySelector('.rec-section');
    const recLabel   = paper.querySelector('.rec-label');

    const accentColors = {
      CRITICAL: 'var(--orange)',
      WARNING:  '#c9a800',
      NORMAL:   '#1db954'
    };

    function applyAccent(value) {
      const color = accentColors[value] || accentColors.NORMAL;
      // ISO code
      isoValue.className = `kpi-value${value === 'CRITICAL' ? ' critical' : value === 'WARNING' ? ' warning' : ''}`;
      // Section dots
      dots.forEach(d => d.style.background = color);
      // Rec box border + label
      if (recSection) {
        recSection.style.borderLeftColor = color;
        recSection.style.background = value === 'NORMAL' ? '#f5fff8' : value === 'WARNING' ? '#fffde6' : '#fff8f5';
      }
      if (recLabel) recLabel.style.color = color;
    }

    select.addEventListener('change', () => {
      const chosen = statusInfo(select.value);
      badge.textContent = chosen.label;
      badge.className = `status-badge ${chosen.cssClass}`;
      applyAccent(chosen.value);
    });

    // Auto-height textareas
    paper.querySelectorAll('.editable-rec').forEach(ta=>{
      setTimeout(()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';},50);
      ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    });
  });

  document.getElementById('upload-screen').style.display='none';
  document.getElementById('report-screen').style.display='block';
}

function safeVal(v){ return (v||'—').toString().replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleEdit(){
  editMode=!editMode;
  document.querySelectorAll('.report-paper').forEach(p=>p.classList.toggle('edit-mode',editMode));
  const btn=document.getElementById('edit-btn');
  btn.classList.toggle('active',editMode);
  btn.textContent=editMode?'✅ Listo':'✏️ Editar campos';
  document.getElementById('edit-hint').textContent=editMode
    ?'✏️ Campos en amarillo son editables. El estado también se puede cambiar.'
    :'💡 Activa "Editar" para corregir datos antes de guardar.';
}

function showProcessing(on){
  document.getElementById('processing').style.display=on?'flex':'none';
  if(!on){
    document.getElementById('progress-bar-wrap').style.display='none';
    document.getElementById('progress-bar').style.width='0%';
    document.getElementById('progress-text').textContent='';
  }
  document.getElementById('upload-error').style.display='none';
}
function showError(msg){const el=document.getElementById('upload-error');el.textContent=msg;el.style.display='block';}
function resetApp(){
  document.getElementById('upload-screen').style.display='flex';
  document.getElementById('report-screen').style.display='none';
  document.getElementById('reports-container').innerHTML='';
  document.getElementById('file-input').value='';
  editMode=false;
}
</script>
</body>
</html>
